name: Release Desktop Installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Validate tag/version consistency
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          CARGO_VERSION="$(awk -F'\"' '/^version = \"/ { print $2; exit }' src-tauri/Cargo.toml)"

          if [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag ${TAG_VERSION} does not match package.json ${PACKAGE_VERSION}"
            exit 1
          fi

          if [ "${TAG_VERSION}" != "${TAURI_VERSION}" ]; then
            echo "Tag ${TAG_VERSION} does not match tauri.conf.json ${TAURI_VERSION}"
            exit 1
          fi

          if [ "${TAG_VERSION}" != "${CARGO_VERSION}" ]; then
            echo "Tag ${TAG_VERSION} does not match Cargo.toml ${CARGO_VERSION}"
            exit 1
          fi

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: Evo Broadcast Control ${{ github.ref_name }}
          releaseBody: |
            Desktop installers for Evo Broadcast Control.

            Includes:
            - macOS bundle (app/dmg)
            - Windows installer (nsis/msi)
          releaseDraft: false
          prerelease: false
